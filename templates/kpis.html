{% extends "base.html" %}
{% block title %}KPI Dashboard — MoneyMap{% endblock %}

{% block content %}
<div id="kpiApp">
    <div class="page-header">
        <h1>KPI Dashboard</h1>
    </div>

    <!-- Mode toggle -->
    <div class="mode-bar" id="modeBar">
        <button class="mode-btn active" data-mode="ytd"      onclick="setMode('ytd')">YTD View</button>
        <button class="mode-btn"        data-mode="trailing" onclick="setMode('trailing')">Trailing View</button>
    </div>

    <div id="kpiLoading" class="empty-state">Loading...</div>
    <div id="kpiEmpty"   class="empty-state hidden">No transaction data yet. <a href="/upload">Upload a CSV</a> to get started.</div>

    <div id="kpiContent" class="hidden">

        <!-- ── YTD Summary ───────────────────────────────────── -->
        <div class="section" style="margin-bottom:16px">
            <div class="section-header">
                <h2>Year to Date &nbsp;<span id="ytdYearLabel" style="color:var(--text-muted);font-weight:400;font-size:14px"></span></h2>
                <span id="ytdDaysLabel" style="font-size:12px;color:var(--text-muted)"></span>
            </div>
            <div class="kpi-grid" id="ytdCards"></div>
        </div>

        <!-- ── Income KPIs ──────────────────────────────────── -->
        <div class="section kpi-group" id="incomeGroup"></div>

        <!-- ── Spending KPIs ────────────────────────────────── -->
        <div class="section kpi-group" id="spendGroup"></div>

        <!-- ── Net KPIs ─────────────────────────────────────── -->
        <div class="section kpi-group" id="netGroup"></div>

        <!-- ── Year over Year ───────────────────────────────── -->
        <div id="compareSection" class="section hidden" style="margin-bottom:16px">
            <div class="section-header">
                <h2>Year over Year</h2>
                <span id="compareYearsLabel" style="font-size:12px;color:var(--text-muted)"></span>
            </div>
            <div class="kpi-grid" id="compareSummaryCards" style="margin-bottom:20px"></div>
            <div class="chart-card" style="margin-bottom:0">
                <h3 id="compareChartTitle"></h3>
                <canvas id="compareChart" style="height:220px;max-height:220px"></canvas>
            </div>
        </div>

        <!-- ── Methodology note ─────────────────────────────── -->
        <div class="section" style="margin-bottom:0">
            <div class="section-header" style="cursor:pointer;margin-bottom:0" onclick="toggleMethodology()">
                <h2 style="font-size:13px;color:var(--text-muted);font-weight:500">ℹ Projection methodology</h2>
                <span id="methodologyToggle" style="font-size:12px;color:var(--accent)">Show</span>
            </div>
            <div id="methodologyBody" class="hidden" style="padding-top:12px;font-size:13px;color:var(--text-secondary);line-height:1.7"></div>
        </div>

    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// ─── STATE ────────────────────────────────────────
let currentMode = 'ytd';   // 'ytd' | 'trailing'
let compareChartInstance = null;

// ─── INIT ─────────────────────────────────────────
async function init() { await loadKPIs(); }

function setMode(m) {
    currentMode = m;
    document.querySelectorAll('#modeBar .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    loadKPIs();
}

async function loadKPIs() {
    document.getElementById('kpiLoading').classList.remove('hidden');
    document.getElementById('kpiContent').classList.add('hidden');
    document.getElementById('kpiEmpty').classList.add('hidden');

    const res  = await fetch(`/api/kpis?mode=${currentMode}`);
    const data = await res.json();

    document.getElementById('kpiLoading').classList.add('hidden');

    if (!data.has_data) {
        document.getElementById('kpiEmpty').classList.remove('hidden');
        return;
    }

    document.getElementById('kpiContent').classList.remove('hidden');
    renderYTD(data.ytd, data.compare_years);
    renderGroup('incomeGroup', 'Income',   'income', data.table_kpis);
    renderGroup('spendGroup',  'Spending', 'spend',  data.table_kpis);
    renderGroup('netGroup',    'Net',      'net',    data.table_kpis);
    renderCompare(data.compare_years);
    renderMethodologyNote(data);
}

// ─── FORMAT HELPERS ───────────────────────────────
function fmt(v) {
    return '$' + Math.abs(v).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function fmtSigned(v, invertColor) {
    const sign = v >= 0 ? '+' : '';
    const cls  = invertColor ? (v > 0 ? 'negative' : 'positive') : (v >= 0 ? 'positive' : 'negative');
    return `<span class="${cls}">${sign}${fmt(v)}</span>`;
}

// ─── YTD SUMMARY CARDS ────────────────────────────
// Shows current YTD total, prior-year same-date YTD total, YoY change, and EOY pace.
function renderYTD(ytd, compare) {
    document.getElementById('ytdYearLabel').textContent = ytd.year;
    const total = ytd.days_elapsed + ytd.days_remaining;
    document.getElementById('ytdDaysLabel').textContent =
        `Day ${ytd.days_elapsed} of ${total} · ${ytd.days_remaining} days remaining`;

    const pct = Math.round((ytd.days_elapsed / total) * 100);
    const pri = compare && compare.has_prior_year ? compare.prior_year : null;

    const cards = [
        { label: 'YTD Income', cur: ytd.income, eoy: ytd.projected_eoy_income,
          priVal: pri ? pri.income : null, valCls: 'positive', accentCls: 'card-accent-green', invert: false },
        { label: 'YTD Spend',  cur: ytd.spend,  eoy: ytd.projected_eoy_spend,
          priVal: pri ? pri.spend  : null, valCls: 'negative', accentCls: 'card-accent-red',   invert: true  },
        { label: 'YTD Net',    cur: ytd.net,     eoy: ytd.projected_eoy_net,
          priVal: pri ? pri.net    : null,
          valCls: ytd.net >= 0 ? 'positive' : 'negative',
          accentCls: ytd.net >= 0 ? 'card-accent-green' : 'card-accent-red', invert: false },
    ];

    document.getElementById('ytdCards').innerHTML = cards.map(c => {
        let yoyHtml = '';
        if (c.priVal !== null) {
            const delta  = c.cur - c.priVal;
            const deltaPct = c.priVal !== 0 ? Math.round((delta / Math.abs(c.priVal)) * 100) : 0;
            yoyHtml = `
                <div class="kpi-sub" style="margin-top:2px">
                    vs ${pri.year} YTD <span style="font-family:'JetBrains Mono',monospace">${fmt(c.priVal)}</span>
                    &nbsp;${fmtSigned(delta, c.invert)} (${deltaPct >= 0 ? '+' : ''}${deltaPct}%)
                </div>`;
        }
        return `
        <div class="kpi-card ${c.accentCls}">
            <div class="kpi-label">${c.label}</div>
            <div class="kpi-value ${c.valCls}">${fmt(c.cur)}</div>
            ${yoyHtml}
            <div class="kpi-sub" style="margin-top:4px">EOY pace: <span style="font-family:'JetBrains Mono',monospace">${fmt(c.eoy)}</span></div>
            <div class="ytd-bar"><div class="ytd-bar-fill" style="width:${pct}%"></div></div>
        </div>`;
    }).join('');
}

// ─── KPI GROUP TABLES ─────────────────────────────
// YTD mode:      columns = YTD Avg | EOY Pace    final row = "EOY Pace"
// Trailing mode: columns = Trailing Avg           final row = "Annualized Trend"
function renderGroup(elId, title, metric, kpis) {
    if (!kpis || !kpis[metric]) return;
    const m = kpis[metric];

    const avgRows = [
        { key: 'avg_daily',     label: 'Daily avg'     },
        { key: 'avg_weekly',    label: 'Weekly avg'    },
        { key: 'avg_monthly',   label: 'Monthly avg'   },
        { key: 'avg_quarterly', label: 'Quarterly avg' },
    ];

    const dot = { income: 'var(--green)', spend: 'var(--red)', net: 'var(--accent)' }[metric];
    let thead, rows;

    if (currentMode === 'ytd') {
        thead = `<tr>
            <th>Horizon</th>
            <th class="text-right">YTD Avg</th>
            <th class="text-right">EOY Pace</th>
        </tr>`;
        rows = avgRows.map(h => `<tr>
            <td style="color:var(--text-secondary)">${h.label}</td>
            <td class="text-right mono positive">${fmt(m[h.key])}</td>
            <td class="text-right mono" style="color:var(--text-muted)">—</td>
        </tr>`).join('');
        // Final row: YTD Total + EOY Pace (full-year projection)
        rows += `<tr style="border-top:1px solid var(--border);font-weight:600">
            <td style="color:var(--text-primary)">EOY Pace</td>
            <td class="text-right mono" style="color:var(--text-muted)">${fmt(m.ytd_total)}</td>
            <td class="text-right mono" style="color:var(--accent)">${fmt(m.eoy_pace)}</td>
        </tr>`;
    } else {
        thead = `<tr>
            <th>Horizon</th>
            <th class="text-right">Trailing Avg</th>
        </tr>`;
        rows = avgRows.map(h => `<tr>
            <td style="color:var(--text-secondary)">${h.label}</td>
            <td class="text-right mono positive">${fmt(m[h.key])}</td>
        </tr>`).join('');
        // Final row: Annualized Trend (trailing monthly avg × 12)
        rows += `<tr style="border-top:1px solid var(--border);font-weight:600">
            <td style="color:var(--text-primary)">Annualized Trend</td>
            <td class="text-right mono" style="color:var(--accent)">${fmt(m.annualized_trend)}</td>
        </tr>`;
    }

    document.getElementById(elId).innerHTML = `
        <div class="section-header" style="margin-bottom:12px">
            <h2 style="display:flex;align-items:center;gap:8px">
                <span style="width:9px;height:9px;border-radius:50%;background:${dot};display:inline-block;flex-shrink:0"></span>
                ${title} KPIs
            </h2>
        </div>
        <div class="table-wrapper">
            <table class="txn-table kpi-table">
                <thead>${thead}</thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
    `;
}

// ─── YEAR COMPARISON ──────────────────────────────
// Chart only shows Jan through current month for both years (same-date YTD, apples-to-apples).
function renderCompare(compare) {
    const section = document.getElementById('compareSection');
    if (!compare.has_prior_year) { section.classList.add('hidden'); return; }
    section.classList.remove('hidden');

    const cur = compare.current_year;
    const pri = compare.prior_year;

    document.getElementById('compareYearsLabel').textContent = compare.comparison_label;
    document.getElementById('compareChartTitle').textContent =
        `Monthly Income & Spend — ${cur.year} YTD vs ${pri.year} same months`;

    // Summary cards (same-date YTD vs same-date YTD)
    const fields = [
        { label: 'Income', cur: cur.income, pri: pri.income, invert: false },
        { label: 'Spend',  cur: cur.spend,  pri: pri.spend,  invert: true  },
        { label: 'Net',    cur: cur.net,    pri: pri.net,    invert: false  },
    ];
    document.getElementById('compareSummaryCards').innerHTML = fields.map(f => {
        const delta = f.cur - f.pri;
        const pct   = f.pri !== 0 ? Math.round((delta / Math.abs(f.pri)) * 100) : 0;
        return `<div class="kpi-card">
            <div class="kpi-label">${f.label}</div>
            <div style="display:flex;gap:20px;align-items:baseline;flex-wrap:wrap;margin-top:4px">
                <div>
                    <div style="font-size:10px;color:var(--text-muted);margin-bottom:1px">${cur.year} YTD</div>
                    <div class="kpi-value">${fmt(f.cur)}</div>
                </div>
                <div>
                    <div style="font-size:10px;color:var(--text-muted);margin-bottom:1px">${pri.year} YTD</div>
                    <div style="font-family:'JetBrains Mono',monospace;font-size:16px;color:var(--text-secondary)">${fmt(f.pri)}</div>
                </div>
            </div>
            <div class="kpi-sub" style="margin-top:4px">
                ${fmtSigned(delta, f.invert)} (${pct >= 0 ? '+' : ''}${pct}%) YoY
            </div>
        </div>`;
    }).join('');

    // Chart: both arrays are already trimmed to Jan–current month by the backend
    if (compareChartInstance) compareChartInstance.destroy();
    compareChartInstance = new Chart(document.getElementById('compareChart'), {
        type: 'bar',
        data: {
            labels: cur.by_month.map(m => m.label),
            datasets: [
                { label: `${cur.year} Income`, data: cur.by_month.map(m => m.income), backgroundColor: 'rgba(52,211,153,0.8)',  borderRadius: 3, barPercentage: 0.45, categoryPercentage: 0.85 },
                { label: `${pri.year} Income`, data: pri.by_month.map(m => m.income), backgroundColor: 'rgba(52,211,153,0.25)', borderRadius: 3, barPercentage: 0.45, categoryPercentage: 0.85 },
                { label: `${cur.year} Spend`,  data: cur.by_month.map(m => m.spend),  backgroundColor: 'rgba(99,102,241,0.8)',  borderRadius: 3, barPercentage: 0.45, categoryPercentage: 0.85 },
                { label: `${pri.year} Spend`,  data: pri.by_month.map(m => m.spend),  backgroundColor: 'rgba(99,102,241,0.25)', borderRadius: 3, barPercentage: 0.45, categoryPercentage: 0.85 },
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
                legend: { labels: { color: '#94a3b8', font: { family: 'DM Sans', size: 11 }, boxWidth: 12 } },
                tooltip: { callbacks: { label: ctx => ` ${ctx.dataset.label}: $${ctx.parsed.y.toLocaleString(undefined, {minimumFractionDigits: 2})}` } }
            },
            scales: {
                x: { ticks: { color: '#64748b', font: { size: 11 } }, grid: { display: false } },
                y: { ticks: { color: '#64748b', callback: v => '$' + v.toLocaleString(), font: { size: 10 } }, grid: { color: 'rgba(148,163,184,0.08)' }, beginAtZero: true }
            }
        }
    });
}

// ─── METHODOLOGY NOTE ─────────────────────────────
function renderMethodologyNote(data) {
    const kpis = data.table_kpis;
    let body;
    if (currentMode === 'ytd') {
        const meta = kpis && kpis.meta ? kpis.meta : {};
        body = `
            <p style="margin-bottom:6px"><strong>YTD View</strong> — All averages derived from year-to-date totals divided by elapsed calendar time.</p>
            <p style="margin-bottom:4px">Daily avg: YTD total ÷ ${meta.days_elapsed || '—'} elapsed days &nbsp;·&nbsp;
               Weekly avg: ÷ ${meta.elapsed_weeks || '—'} weeks &nbsp;·&nbsp;
               Monthly avg: ÷ ${meta.elapsed_months ? meta.elapsed_months.toFixed(2) : '—'} months &nbsp;·&nbsp;
               Quarterly avg: ÷ ${meta.elapsed_quarters ? meta.elapsed_quarters.toFixed(2) : '—'} quarters</p>
            <p>EOY Pace: YTD total ÷ ${meta.days_elapsed || '—'} days × ${meta.days_in_year || 365}</p>`;
    } else {
        const meta = kpis && kpis.meta ? kpis.meta : {};
        body = `
            <p style="margin-bottom:6px"><strong>Trailing View</strong> — All averages from rolling recent windows, using calendar days.</p>
            <p style="margin-bottom:4px">Daily avg: sum of trailing ${meta.trailing_daily_days || 28} calendar days ÷ ${meta.trailing_daily_days || 28} &nbsp;·&nbsp;
               Weekly avg: avg of trailing ${meta.trailing_weekly_weeks || 4} complete weeks &nbsp;·&nbsp;
               Monthly avg: avg of trailing ${meta.trailing_monthly_months || 3} complete months</p>
            <p>Annualized Trend: trailing monthly avg × 12</p>`;
    }
    document.getElementById('methodologyBody').innerHTML =
        body + `<p style="margin-top:8px;color:var(--text-muted);font-size:12px">Switch modes using the toggle above to compare YTD pace vs recent run-rate.</p>`;
}

function toggleMethodology() {
    const body   = document.getElementById('methodologyBody');
    const toggle = document.getElementById('methodologyToggle');
    body.classList.toggle('hidden');
    toggle.textContent = body.classList.contains('hidden') ? 'Show' : 'Hide';
}

// ─── BOOT ─────────────────────────────────────────
init();
</script>
{% endblock %}
